<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元数AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; color: #1d1d1f; padding: 20px;
}
.card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; padding: 36px; width: 520px; max-width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  border: 1px solid rgba(255,255,255,0.5);
}
h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.sub { color: #86868b; font-size: 14px; margin-bottom: 24px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
input {
  flex: 1; padding: 12px 16px; border: 1.5px solid #d2d2d7; border-radius: 12px;
  font-size: 14px; outline: none; transition: all .2s; background: rgba(255,255,255,0.8);
}
input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
button {
  padding: 12px; border: none; border-radius: 12px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: #0071e3; color: white; flex: 0 0 auto; padding: 12px 20px; }
.btn-primary:hover { background: #0077ed; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #bbb; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; color: #555; border: 1.5px solid #d2d2d7; }
.btn-outline:hover { background: #f5f5f7; border-color: #bbb; }
.btn-danger { background: transparent; color: #d22; border: 1.5px solid #fcc; }
.btn-danger:hover { background: #fee; }
.btn-text { background: none; border: none; color: #888; font-size: 12px; padding: 4px 0; }
.btn-text:hover { color: #555; }
.status { margin-top: 20px; }
.stat-row {
  display: flex; align-items: center; gap: 8px; font-size: 13px;
  padding: 8px 12px; border-radius: 10px; margin-bottom: 4px;
}
.stat-row.ok { background: #e8f5e9; }
.stat-row.info { background: #e3f2fd; }
.stat-row.muted { background: #f5f5f7; color: #888; }
.stat-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-row .dot.on { background: #1d7d1d; }
.stat-row .dot.off { background: #bbb; }
.models { margin-top: 16px; }
.models h3 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.model-tag {
  padding: 8px 12px; background: #f0f0f5; border-radius: 8px;
  font-size: 12px; color: #333; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.model-tag:hover { background: #e5e5ea; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #e0e0e0;
        border-top-color: #0071e3; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e8e8ed; display: flex; justify-content: space-between; align-items: center; }
.settings { margin-top: 12px; border-top: 1px solid #e8e8ed; padding-top: 12px; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>元数智慧</h1>
  <div class="sub" id="subtitle">AI Proxy</div>

  <div id="loginSection">
    <label for="key">API Key</label>
    <div class="input-row">
      <input type="password" id="key" placeholder="请输入 API Key" autofocus>
      <button class="btn-primary" id="btnLogin" onclick="login()">登录</button>
    </div>
  </div>

  <div class="status" id="statusArea"></div>
  <div class="models" id="modelsPanel" style="display:none">
    <h3>可用模型</h3>
    <div class="model-grid" id="modelList"></div>
  </div>
  <div class="footer" id="footerSection" style="display:none">
    <div>
      <button class="btn-outline" id="btnLogout" onclick="logout()" style="display:none">退出</button>
    </div>
    <div>
      <span id="modelCount" style="font-size:12px;color:#888;margin-right:8px"></span>
      <button class="btn-danger" id="btnQuit" onclick="quitApp()" style="font-size:12px;padding:6px 12px">关闭应用</button>
    </div>
  </div>
</div>

<script>
async function get(path) {
  const r = await fetch(path); return r.json();
}
async function post(path, body) {
  const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{})});
  return r.json();
}

function el(id) { return document.getElementById(id); }

function showStatus(items) {
  el('statusArea').innerHTML = items.map(s =>
    '<div class="stat-row ' + s.cls + '"><span class="dot ' + s.dot + '"></span>' + s.text + '</div>'
  ).join('');
}

function showModels(models) {
  el('modelsPanel').style.display = 'block';
  el('modelList').innerHTML = models.map(m => '<div class="model-tag">' + m + '</div>').join('');
  el('modelCount').textContent = models.length + ' 个模型';
}

async function login() {
  const key = el('key').value;
  if (!key) return;
  el('btnLogin').disabled = true;
  el('btnLogin').textContent = '登录中...';
  showStatus([{ cls:'info', dot:'off', text:'登录中...' }]);
  try {
    const res = await post('/api/login', { api_key: key });
    if (res.ok) {
      showStatus([{ cls:'ok', dot:'on', text:'已登录' }]);
      el('loginSection').style.display = 'none';
      el('footerSection').style.display = 'flex';
      el('btnLogout').style.display = 'block';
      el('subtitle').textContent = '共 ' + res.models.length + ' 个模型可用';
      if (res.models) showModels(res.models);
    } else {
      showStatus([{ cls:'muted', dot:'off', text: res.message || '登录失败' }]);
    }
  } catch(e) {
    showStatus([{ cls:'muted', dot:'off', text:'登录失败，请重试' }]);
  }
  el('btnLogin').textContent = '登录';
  el('btnLogin').disabled = false;
}

async function logout() {
  el('btnLogout').disabled = true;
  showStatus([{ cls:'info', dot:'off', text:'退出中...' }]);
  await post('/api/logout');
  showStatus([{ cls:'muted', dot:'off', text:'已退出' }]);
  el('loginSection').style.display = 'block';
  el('footerSection').style.display = 'none';
  el('btnLogout').style.display = 'none';
  el('modelsPanel').style.display = 'none';
  el('subtitle').textContent = 'AI Proxy';
  el('btnLogout').disabled = false;
  el('key').focus();
}

async function quitApp() {
  if (!confirm('确定关闭元数AI？')) return;
  await fetch('/api/quit');
}

async function refresh() {
  showStatus([{ cls:'info', dot:'off', text:'检查中...' }]);
  const res = await get('/api/status');
  if (res.logged_in) {
    showStatus([{ cls:'ok', dot:'on', text:'已就绪' }]);
    el('loginSection').style.display = 'none';
    el('footerSection').style.display = 'flex';
    el('btnLogout').style.display = 'block';
    el('key').value = '';
    el('subtitle').textContent = (res.models ? res.models.length + ' 个模型可用' : '已配置');
    if (res.models && res.models.length > 0) showModels(res.models);
  } else {
    showStatus([{ cls:'muted', dot:'off', text:'未登录' }]);
  }
}
refresh();
</script>
</body>
</html>

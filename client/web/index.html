<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元数AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; color: #1d1d1f; padding: 20px;
}
.card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; padding: 36px; width: 480px; max-width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  border: 1px solid rgba(255,255,255,0.5);
}
.logo { font-size: 28px; margin-bottom: 2px; }
h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.sub { color: #86868b; font-size: 14px; margin-bottom: 24px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.input-row { display: flex; gap: 8px; }
input {
  flex: 1; padding: 12px 16px; border: 1.5px solid #d2d2d7; border-radius: 12px;
  font-size: 14px; outline: none; transition: all .2s; background: rgba(255,255,255,0.8);
}
input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
.btns { display: flex; gap: 8px; margin-top: 16px; }
button {
  flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: #0071e3; color: white; }
.btn-primary:hover { background: #0077ed; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #bbb; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; color: #555; border: 1.5px solid #d2d2d7; }
.btn-outline:hover { background: #f5f5f7; border-color: #bbb; }
.status { margin-top: 20px; padding: 16px; background: #f5f5f7; border-radius: 14px; }
.status-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; }
.log {
  margin-top: 12px; max-height: 100px; overflow-y: auto; font-size: 11px;
  color: #888; background: #1d1d1f; border-radius: 10px; padding: 12px;
  font-family: "SF Mono", "Menlo", monospace; line-height: 1.6;
}
.models { margin-top: 16px; display: none; }
.models.visible { display: block; }
.models h3 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.model-tag {
  padding: 8px 12px; background: #f0f0f5; border-radius: 8px;
  font-size: 12px; color: #333; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #e0e0e0;
        border-top-color: #0071e3; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🪄</div>
  <h1>元数智慧</h1>
  <div class="sub" id="subtitle">元数AI · 一键配置</div>

  <div id="loginSection">
    <label for="key">API Key</label>
    <div class="input-row">
      <input type="password" id="key" placeholder="请输入 API Key" autofocus>
      <button class="btn-primary" id="btnLogin" onclick="login()" style="flex:0 0 auto; padding:12px 20px">登录</button>
    </div>
  </div>

  <div class="btns">
    <button class="btn-outline" id="btnLogout" onclick="logout()" style="display:none">退出</button>
  </div>

  <div class="status">
    <div class="status-item" id="statusLogin">⏳ 检查状态...</div>
    <div class="status-item" id="statusServer" style="display:none"></div>
  </div>

  <div class="models" id="modelsPanel">
    <h3>可用模型</h3>
    <div class="model-grid" id="modelList"></div>
  </div>

  <div class="log" id="log" style="display:none"></div>
</div>

<script>
async function api(action, body) {
  const resp = await fetch('/api/' + action, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {})
  });
  return resp.json();
}

function showModels(models) {
  const panel = document.getElementById('modelsPanel');
  const list = document.getElementById('modelList');
  list.innerHTML = models.map(m => '<div class="model-tag">' + m + '</div>').join('');
  panel.classList.add('visible');
  document.getElementById('subtitle').textContent = '共 ' + models.length + ' 个模型可用';
}

async function login() {
  const key = document.getElementById('key').value;
  if (!key) { return; }
  document.getElementById('btnLogin').disabled = true;
  document.getElementById('btnLogin').textContent = '⏳';
  setStatus('statusLogin', '登录中，请确认系统密码框...', false, true);
  try {
    const res = await api('login', { api_key: key });
    setStatus('statusLogin', res.ok ? '已登录' : '登录失败', res.ok, false);
    document.getElementById("loginSection").style.display = "none";
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('btnLogout').style.display = 'block';
    if (res.models) showModels(res.models);
  } catch(e) {
    setStatus('statusLogin', '连接失败', false, false);
  }
  document.getElementById('btnLogin').textContent = '登录';
  document.getElementById('btnLogin').disabled = false;
}

async function logout() {
  document.getElementById('btnLogout').disabled = true;
  await api('logout');
  setStatus('statusLogin', '未登录', false, false);
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('btnLogin').style.display = 'block';
  document.getElementById('btnLogout').style.display = 'none';
  document.getElementById('statusServer').style.display = 'none';
  document.getElementById('modelsPanel').classList.remove('visible');
  document.getElementById('subtitle').textContent = '元数AI · 一键配置';
  document.getElementById('btnLogout').disabled = false;
}

function setStatus(id, text, ok, spin) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.innerHTML = (spin ? '<span class="spin"></span>' : (ok ? '✅' : '❌')) + ' ' + text;
  el.style.color = ok ? '#1d7d1d' : spin ? '#888' : '#d22';
}

async function refresh() {
  const res = await api('status');
  const loggedIn = res.logged_in;
  setStatus('statusLogin', loggedIn ? '已登录' : '未登录', loggedIn, false);
  if (loggedIn) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('btnLogout').style.display = 'block';
    document.getElementById('key').value = '';
    if (res.models && res.models.length > 0) showModels(res.models);
    if (res.server_running) {
      const s = document.getElementById('statusServer');
      s.style.display = 'block';
      s.innerHTML = '✅ 加速服务运行中';
      s.style.color = '#1d7d1d';
    }
  }
}
refresh();
</script>
</body>
</html>

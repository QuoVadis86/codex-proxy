<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元数智慧 · Codex AI Proxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #f5f5f7; display: flex; align-items: center; justify-content: center;
       min-height: 100vh; color: #1d1d1f; }
.card { background: white; border-radius: 16px; padding: 32px; width: 400px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.sub { color: #86868b; font-size: 14px; margin-bottom: 24px; }
label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
input { width: 100%; padding: 10px 14px; border: 1.5px solid #d2d2d7; border-radius: 10px;
        font-size: 14px; outline: none; transition: border .2s; }
input:focus { border-color: #0071e3; }
.btns { display: flex; gap: 10px; margin-top: 16px; }
button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px;
         font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-primary { background: #0071e3; color: white; }
.btn-primary:hover { background: #0077ed; }
.btn-primary:disabled { background: #bbb; cursor: not-allowed; }
.btn-danger { background: #ff3b30; color: white; }
.btn-danger:hover { background: #d62d20; }
.btn-danger:disabled { background: #bbb; cursor: not-allowed; }
.status { margin-top: 20px; padding: 14px; background: #f5f5f7; border-radius: 10px; }
.status-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; }
.status-item:last-child { margin-bottom: 0; }
.log { margin-top: 12px; max-height: 120px; overflow-y: auto; font-size: 12px;
       color: #86868b; background: #1d1d1f; border-radius: 8px; padding: 10px;
       font-family: "SF Mono", Monaco, monospace; line-height: 1.5; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd;
        border-top-color: #0071e3; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>元数智慧</h1>
  <div class="sub">Codex AI Proxy · 一键配置</div>

  <label for="key">API Key</label>
  <input type="password" id="key" placeholder="请输入 API Key">

  <div class="btns">
    <button class="btn-primary" id="btnLogin" onclick="login()">🔑 登录</button>
    <button class="btn-danger" id="btnLogout" onclick="logout()">🚪 退出</button>
  </div>

  <div class="status">
    <div class="status-item" id="statusLogin">⏳ 检查登录状态...</div>
    <div class="status-item" id="statusServer">⏳ 检查服务状态...</div>
  </div>
  <div class="log" id="log">等待操作...</div>
</div>

<script>
async function api(action, body) {
  const resp = await fetch('/api/' + action, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {})
  });
  return resp.json();
}
function addLog(msg) { const el = document.getElementById('log'); el.textContent += '\n' + msg; el.scrollTop = el.scrollHeight; }
function setStatus(id, text, ok) { document.getElementById(id).textContent = (ok ? '✅ ' : '❌ ') + text; }

async function login() {
  const key = document.getElementById('key').value;
  if (!key) { addLog('⚠️ 请输入 API Key'); return; }
  document.getElementById('btnLogin').disabled = true;
  addLog('→ 正在登录（可能弹出系统密码框，请输入电脑密码）...');
  setStatus('statusLogin', '登录中，请确认系统密码框...', false);
  try {
    const res = await api('login', { api_key: key });
    addLog(res.message || '完成');
    if (res.ok) {
      setStatus('statusLogin', '已登录', true);
      setStatus('statusServer', '劫持服务运行中', true);
    } else {
      setStatus('statusLogin', '登录失败', false);
    }
  } catch(e) {
    addLog('❌ 请求超时或失败: ' + e);
    setStatus('statusLogin', '错误', false);
  }
  document.getElementById('btnLogin').disabled = false;
}

async function logout() {
  document.getElementById('btnLogout').disabled = true;
  addLog('→ 正在退出...');
  const res = await api('logout');
  addLog(res.message || '完成');
  setStatus('statusLogin', '未登录', false);
  setStatus('statusServer', '已停止', false);
  document.getElementById('btnLogout').disabled = false;
}

async function refresh() {
  const res = await api('status');
  setStatus('statusLogin', res.logged_in ? '已登录' : '未登录', res.logged_in);
  setStatus('statusServer', res.server_running ? '劫持服务运行中' : '已停止', res.server_running);
  if (res.models) document.querySelector('.sub').textContent = '共 ' + res.models + ' 个模型可用';
}
refresh();
</script>
</body>
</html>
